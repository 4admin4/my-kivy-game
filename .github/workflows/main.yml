name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev \
          libssl-dev cmake git zip unzip openjdk-17-jdk python3-pip \
          autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libgdbm-dev libsqlite3-dev libdb5.3-dev \
          libbz2-dev libexpat1-dev liblzma-dev tk-dev lld
          pip install --upgrade pip
          pip install "cython<3.0" buildozer

      - name: Build APK with Buildozer
        run: |
          # 1. Приймаємо ліцензії через прямий шлях до sdkmanager
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
          
          # 2. Встановлюємо стабільні build-tools (33.0.0), щоб уникнути помилок з версією 37
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;33.0.0" "platform-tools" "platforms;android-31"
          
          # 3. Очищення перед початком
          rm -rf .buildozer
          
          # 4. Запуск збірки (автоматично знайде встановлений SDK)
          buildozer -v android debug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-game-package
          path: bin/*.apk
