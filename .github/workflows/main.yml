name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev \
          libssl-dev cmake git zip unzip openjdk-17-jdk python3-pip \
          autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libgdbm-dev libsqlite3-dev libdb5.3-dev \
          libbz2-dev libexpat1-dev liblzma-dev tk-dev lld
          pip install --upgrade pip
          pip install "cython<3.0" buildozer

      - name: Build APK with Buildozer
        run: |
          # 1. Створюємо папки для SDK та ліцензій
          mkdir -p $ANDROID_HOME/licenses
          
          # 2. Вручну прописуємо хеші ліцензій (це імітує натискання "y")
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7430c38695f24d67cd\n24333f8a63b6825ea0c5d051f71c2d9b4d0293c3" > $ANDROID_HOME/licenses/android-sdk-license
          echo -e "84831b9409646a918e30573bab4c9c91346d8abd\n50466322041065615a6820ff53e85ad9e6389c92" > $ANDROID_HOME/licenses/android-sdk-preview-license
          
          # 3. Примусово встановлюємо build-tools 33
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;33.0.0" "platform-tools" "platforms;android-31"
          
          # 4. Очищення та запуск збірки
          rm -rf .buildozer
          buildozer -v android debug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-game-package
          path: bin/*.apk
