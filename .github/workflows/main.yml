name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev \
          libssl-dev cmake git zip unzip openjdk-17-jdk python3-pip \
          autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libgdbm-dev libsqlite3-dev libdb5.3-dev \
          libbz2-dev libexpat1-dev liblzma-dev tk-dev lld
          pip install --upgrade pip
          pip install "cython<3.0" buildozer

      - name: Build APK with Buildozer
        run: |
          # 1. Примусово приймаємо ліцензії для ВСІХ встановлених компонентів
          yes | sdkmanager --licenses || true
          
          # 2. Встановлюємо саме ту версію, яку Buildozer шукає за замовчуванням (34 або 33)
          # Це гарантує, що aidl буде знайдено
          sdkmanager "build-tools;34.0.0" "platforms;android-31" "platform-tools"
          
          # 3. Видаляємо папку локального SDK Buildozer, щоб він використав системний
          rm -rf .buildozer
          
          # 4. Запускаємо збірку
          # Ми додаємо параметр, щоб Buildozer не намагався оновлювати SDK
          buildozer -v android debug
        env:
          # Вказуємо Buildozer використовувати вже готовий SDK від GitHub
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk-bundle

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-game-package
          path: bin/*.apk
