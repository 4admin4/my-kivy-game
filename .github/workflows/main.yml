name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev \
          libssl-dev cmake git zip unzip openjdk-17-jdk python3-pip \
          autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libgdbm-dev libsqlite3-dev libdb5.3-dev \
          libbz2-dev libexpat1-dev liblzma-dev tk-dev lld
          pip install --upgrade pip
          pip install "cython<3.0" buildozer

      - name: Build APK with Buildozer
        run: |
          # 1. Знаходимо, де насправді лежать build-tools у системі
          SYSTEM_BT_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "Found system build-tools at: $SYSTEM_BT_PATH"
          
          # 2. Створюємо папку, яку очікує Buildozer (версія 33.0.0)
          BT_DEST="$HOME/.buildozer/android/platform/android-sdk/build-tools/33.0.0"
          mkdir -p "$BT_DEST"
          
          # 3. Копіюємо все з системної папки в папку Buildozer
          cp -r $SYSTEM_BT_PATH/* "$BT_DEST/"
          
          # 4. Вручну підтверджуємо ліцензії
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7430c38695f24d67cd\n24333f8a63b6825ea0c5d051f71c2d9b4d0293c3" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # 5. Запуск збірки
          buildozer -v android debug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-game-package
          path: bin/*.apk
